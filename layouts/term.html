{{ define "main" }}
<div class="page-hero">
  <p class="page-hero__eyebrow">{{ .Data.Singular | title }}</p>
  <h1 class="page-hero__title">{{ .Title }}</h1>
</div>

<div class="recipe-grid">
  {{- range .Pages }}
  {{- if eq .Section "writing" }}
  {{ partial "writing-card.html" . }}
  {{- else }}
  {{ partial "recipe-card.html" (dict "page" .) }}
  {{- end }}
  {{- end }}
</div>
{{ end }}
