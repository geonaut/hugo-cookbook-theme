<div class="content-wrapper footer-content">
  <div class="footer-brand">
    <span class="footer-title">{{ site.Title }}</span>
    <span class="footer-copy">&copy; {{ now.Year }}</span>
  </div>

  <p class="footer-attribution">
    Built with <a href="https://gohugo.io" rel="noopener" class="footer-attr-link">Hugo</a>
    using <a href="https://github.com/geonaut/hugo-cookbook-theme" rel="noopener" class="footer-attr-link">cookbook-theme</a>
    <span class="footer-attr-sep">|</span> Build:
    {{- with site.Params.buildCommit }}
    <a href="{{ site.Params.githubRepo }}/commit/{{ . }}" rel="noopener" class="footer-attr-link footer-attr-link--mono">{{ slicestr . 0 7 }}</a>
    {{- else }}
    <span class="footer-attr-link--mono footer-attr-placeholder">local</span>
    {{- end }}
  </p>

  <div class="footer-social">
    {{- with site.Params.instagram }}
    <a href="{{ . }}" class="footer-link footer-link--icon" rel="noopener" title="{{ i18n "footer_instagram" | default "Instagram" }}" aria-label="{{ i18n "footer_instagram" | default "Instagram" }}">
      <span class="material-symbols-outlined" aria-hidden="true">photo_camera</span>
    </a>
    {{- end }}
  </div>
</div>
